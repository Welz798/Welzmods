<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WELZ MODS - QR Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
    --bg:#030303;
    --red-1:#ff0000;
    --red-2:#ff4b4b;
    --card-size:240px;
    --font-stack:"Orbitron", sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:var(--font-stack) !important;
    -webkit-tap-highlight-color: transparent;
}

html,body{
    background:var(--bg);
    color:#fff;
    height: 100%;
    overflow: hidden;
}

.app{min-height:100vh;display:flex;flex-direction:column}

/* Topbar */
.topbar{
    height:64px;display:flex;align-items:center;padding:0 12px;gap:8px;
    background:linear-gradient(180deg,#000,#050405);
    border-bottom:1px solid rgba(255,0,0,0.3);
}
.back-btn{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--red-2);cursor:pointer; border: 1px solid rgba(255,0,0,0.1);}
.title{color:var(--red-1);font-size:18px;font-weight:700; flex:1; text-align:center; letter-spacing: 1px;}
.right-space{width:44px}

.container{
    flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;gap:20px;
    background: radial-gradient(circle at top, rgba(255,0,0,0.05) 0%, transparent 70%);
}

/* QR Kartı */
.card{
    width:var(--card-size);
    height:var(--card-size);
    border-radius:20px;
    background:#0a0a0a;
    border:2px solid rgba(255,0,0,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    box-shadow:0 0 20px rgba(255,0,0,0.1);
}

.placeholder{
    color:rgba(255,255,255,0.3);
    font-size:11px;
    text-align:center;
    padding:20px;
    text-transform: uppercase;
}

/* QR Ölçüsü */
#qrcode img, #qrcode canvas{
    width:190px !important;
    height:190px !important;
    border: 5px solid white; /* QR daha rahat oxunması üçün ağ kənar */
    border-radius: 10px;
}

/* İdarəetmə Paneli */
.controls{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
.input{
    padding:14px;
    border-radius:12px;
    background:rgba(255,0,0,0.08);
    border:1px solid rgba(255,0,0,0.2);
    color:#fff;
    font-size:13px;
    outline: none;
    text-align: center;
}
.input:focus { border-color: var(--red-1); background: rgba(255,0,0,0.12); }

.row{display:flex;gap:10px}
.btn{
    flex:1;padding:14px;border-radius:12px;background:var(--red-1);
    border:none;color:#fff;font-weight:700;cursor:pointer;font-size:13px;
    transition: 0.2s;
}
.btn:active { transform: scale(0.95); opacity: 0.8; }

.btn.secondary{
    background:transparent;border:1px solid rgba(255,0,0,0.3);color:var(--red-2);
}

/* Status */
.status-card{
    width:100%;max-width:340px;
    padding:12px;border-radius:12px;
    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.1);
    color:var(--red-2);
    font-size:11px;
    text-align: center;
    letter-spacing: 1px;
}

</style>
</head>

<body>
<div class="app">

    <div class="topbar">
        <div class="back-btn" onclick="goHome()">
            <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </div>
        <div class="title">WELZ QR GENERATOR</div>
        <div class="right-space"></div>
    </div>

    <div class="container">

        <div class="card" id="qrCard">
            <div class="placeholder" id="cardPlaceholder">QR yaratmaq üçün mətni daxil edin</div>
            <div id="qrcode" style="display:none"></div>
        </div>

        <div class="controls">
            <input id="urlInput" class="input" type="text" placeholder="Link və ya Mətn daxil edin..." />
            <div class="row">
                <button class="btn" id="generateBtn">YARAT</button>
                <button class="btn secondary" id="clearBtn">TƏMİZLƏ</button>
            </div>
        </div>

        <div class="status-card" id="statusCard">Status: Hazırdır</div>

    </div>
</div>

<script>
const generateBtn = document.getElementById("generateBtn");
const clearBtn = document.getElementById("clearBtn");
const urlInput = document.getElementById("urlInput");
const qrcodeEl = document.getElementById("qrcode");
const placeholder = document.getElementById("cardPlaceholder");
const statusCard = document.getElementById("statusCard");

function setStatus(txt){
    statusCard.textContent = "Status: " + (txt || "Gözlənilir");
}

function clearQR(){
    qrcodeEl.innerHTML = "";
    qrcodeEl.style.display = "none";
    placeholder.style.display = "block";
    setStatus("Təmizləndi");
}

function renderQR(){
    const text = urlInput.value.trim();
    if(!text){
        setStatus("Zəhmət olmasa mətn daxil edin!");
        return;
    }

    qrcodeEl.innerHTML = "";
    qrcodeEl.style.display = "block";
    placeholder.style.display = "none";

    new QRCode(qrcodeEl, {
        text: text,
        width: 190,
        height: 190,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    setStatus("QR Kod Yaradıldı");
}

generateBtn.onclick = renderQR;
urlInput.onkeydown = e => { if(e.key === "Enter") renderQR() };
clearBtn.onclick = () => { urlInput.value = ""; clearQR() };

function goHome(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
