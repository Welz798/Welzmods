<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELZ MODS - Canlı Dəstək</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --red-1: #ff0000; /* Saf qırmızı neon */
            --red-2: #ff4d4d;
            --red-3: #ff8080;
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            height: 100%;
            background: #000;
            font-family: "Orbitron", sans-serif;
            color: #fff;
            overflow: hidden;
            touch-action: manipulation;
        }

        .app {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: linear-gradient(180deg, #000 0%, #0a0000 100%);
            border-bottom: 1px solid rgba(255, 0, 0, 0.3);
        }

        .title {
            flex: 1;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--red-1);
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .header-pill {
            margin: 10px 20px;
            padding: 12px;
            border-radius: 18px;
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.3);
            text-align: center;
            font-size: 14px;
            color: var(--red-2);
            letter-spacing: 1px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #000;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.3s ease;
        }

        .user-message {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.2);
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background: rgba(40, 40, 40, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--red-2);
            border-bottom-left-radius: 5px;
        }

        .system-message {
            background: rgba(255, 0, 0, 0.05);
            color: #888;
            text-align: center;
            max-width: 90%;
            margin: 10px auto;
            font-size: 11px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 5px;
            text-align: right;
        }

        .chat-input-container {
            padding: 15px;
            background: #050000;
            border-top: 1px solid rgba(255, 0, 0, 0.2);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
        }

        .chat-input:focus { border-color: var(--red-1); }

        .icon-btn, .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn { background: #111; border: 1px solid #333; color: var(--red-1); font-size: 20px; }
        .send-btn { background: var(--red-1); border: none; color: white; }

        .typing-indicator { font-size: 11px; color: var(--red-3); text-align: center; display: none; padding: 5px; }

        .session-info { font-size: 9px; color: #444; text-align: center; padding: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div style="width: 40px;"></div>
            <div class="title">WELZ MODS LIVE</div>
            <div style="width: 40px;"></div>
        </div>

        <div class="header-pill">Welz ilə Canlı Əlaqə</div>

        <div class="chat-messages" id="chatMessages"></div>
        
        <div class="typing-indicator" id="typingIndicator">Mesaj göndərilir...</div>
        <div class="session-info" id="sessionInfo">Sessiya ID: Yüklənir...</div>

        <div class="chat-input-container">
            <button class="icon-btn" onclick="document.getElementById('imagePicker').click()">+</button>
            <input type="text" class="chat-input" id="messageInput" placeholder="Mesajınızı yazın..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <input type="file" id="imagePicker" accept="image/*" style="display:none" onchange="handleImageSelect(event)">

    <script>
        const BOT_TOKEN = '8357897241:AAFK15WpVdUZGD3zIQ6GVzzBeQTUHeq9WTs';
        const ADMIN_CHAT_ID = '6179602553';
        
        let currentSessionId = localStorage.getItem('welz_session') || Math.floor(Math.random() * 9000) + 1000;
        localStorage.setItem('welz_session', currentSessionId);
        
        let lastUpdateId = parseInt(localStorage.getItem('last_update_id') || '0');
        let chatHistory = JSON.parse(localStorage.getItem(`history_${currentSessionId}`) || '[]');

        function init() {
            document.getElementById('sessionInfo').innerText = `Sessiya ID: #${currentSessionId}`;
            renderHistory();
            if(chatHistory.length === 0) {
                sendToTelegram("🚀 Yeni bir istifadəçi söhbətə başladı!");
                addMessage("Xoş gəldiniz! Sualınız varsa buyurun yazın.", 'bot');
            }
            setInterval(checkReplies, 4000);
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text) return;

            addMessage(text, 'user');
            input.value = '';
            showTyping(true);

            const ok = await sendToTelegram(text);
            showTyping(false);
            if(!ok) addMessage("Xəta: Mesaj çatdırılmadı.", 'system');
        }

        async function sendToTelegram(msg) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: `[#${currentSessionId}] Mesaj: ${msg}`
                    })
                });
                return res.ok;
            } catch { return false; }
        }

        function addMessage(text, sender) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const msgObj = { text, sender, time };
            chatHistory.push(msgObj);
            localStorage.setItem(`history_${currentSessionId}`, JSON.stringify(chatHistory));
            renderMessage(msgObj);
        }

        function renderMessage(msg) {
            const cont = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${msg.sender}-message`;
            div.innerHTML = `${msg.text}<div class="message-time">${msg.time}</div>`;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
        }

        function renderHistory() {
            chatHistory.forEach(renderMessage);
        }

        async function checkReplies() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();
                if(data.ok && data.result.length > 0) {
                    data.result.forEach(u => {
                        lastUpdateId = u.update_id;
                        localStorage.setItem('last_update_id', lastUpdateId);
                        
                        if(u.message && u.message.text && String(u.message.chat.id) === ADMIN_CHAT_ID) {
                            const txt = u.message.text;
                            if(txt.startsWith(`#${currentSessionId}`)) {
                                const reply = txt.replace(`#${currentSessionId}`, '').trim();
                                addMessage(reply, 'bot');
                            }
                        }
                    });
                }
            } catch (e) {}
        }

        function showTyping(s) { document.getElementById('typingIndicator').style.display = s ? 'block' : 'none'; }

        async function handleImageSelect(e) {
            const file = e.target.files[0];
            if(!file) return;
            showTyping(true);
            const formData = new FormData();
            formData.append('chat_id', ADMIN_CHAT_ID);
            formData.append('photo', file);
            formData.append('caption', `[#${currentSessionId}] Şəkil göndərildi.`);
            
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
            showTyping(false);
            if(res.ok) addMessage("📷 Şəkil göndərildi.", 'user');
        }

        window.onload = init;
    </script>
</body>
</html>
