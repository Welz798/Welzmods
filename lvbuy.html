<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELZ MODS - CANLI DƏSTƏK</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030303;
            --red-1: #ff0000;
            --red-2: #ff4b4b;
            --red-3: #ff8b8b;
            --radius: 22px;
            --font-stack: "Orbitron", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { height:100%; background:#000; font-family:var(--font-stack); color:#fff; overflow:hidden; touch-action:manipulation; }
        .app { width:100%; height:100vh; position:relative; display:flex; flex-direction:column; }
        
        .topbar { height:64px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:linear-gradient(180deg,#000 0%,#050405 100%); border-bottom:1px solid rgba(255,0,0,0.3); }
        .title { flex:1; font-size:21px; letter-spacing:2px; color:var(--red-1); text-align:center; font-weight: bold; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        
        .header-pill { margin:10px 20px; padding:12px; border-radius:18px; background:rgba(255,0,0,0.05); border:1px solid rgba(255,0,0,0.2); text-align:center; font-size:14px; color:var(--red-2); letter-spacing:1px; }
        
        .chat-messages { flex:1; padding:20px; overflow-y:auto; background:#000; }
        .message { margin-bottom:15px; padding:12px 16px; border-radius:18px; max-width:80%; word-wrap:break-word; border:1px solid rgba(255,255,255,0.03); animation:fadeIn .3s ease; }
        
        .user-message { background:rgba(255,0,0,0.12); border:1px solid rgba(255,0,0,0.2); color:#fff; margin-left:auto; border-bottom-right-radius:5px; }
        .bot-message { background:rgba(30,30,30,0.8); border:1px solid rgba(255,255,255,0.1); color:var(--red-2); border-bottom-left-radius:5px; }
        .system-message { background:rgba(255,0,0,0.05); color:var(--red-3); text-align:center; max-width:90%; margin:10px auto; font-size:12px; }
        
        .message-time { font-size:0.7em; opacity:0.7; margin-top:5px; text-align:right; }
        
        .chat-input-container { padding:12px 16px; background:rgba(10,0,0,0.9); border-top:1px solid rgba(255,0,0,0.3); display:flex; gap:8px; align-items:center; }
        .chat-input { flex:1; padding:12px 18px; background:rgba(255,0,0,0.08); border:1px solid rgba(255,0,0,0.3); border-radius:12px; color:white; font-family:var(--font-stack); font-size:14px; outline:none; }
        
        .icon-btn { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.2); color:var(--red-2); cursor:pointer; font-size:22px; }
        .send-btn { width:45px; height:45px; background:var(--red-1); border:none; border-radius:12px; color:white; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        
        .typing-indicator { padding:10px; color:var(--red-3); font-style:italic; display:none; text-align:center; font-size:12px; }
        .session-info { text-align:center; padding:8px; font-size:10px; color:var(--red-3); background:rgba(255,0,0,0.05); border-radius:6px; margin:0 20px; border:1px solid rgba(255,0,0,0.1); }
        
        /* Modallar */
        .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .modal { width:90%; max-width:450px; background:#0a0a0a; border-radius:14px; padding:25px; border:1px solid var(--red-1); text-align:center; }
        .modal h3 { color:var(--red-1); margin-bottom:15px; }
        .btn-close { padding:12px; background:var(--red-1); color:white; border:none; border-radius:10px; width:100%; font-family:var(--font-stack); font-weight:bold; cursor:pointer; }

        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div style="width:40px;"></div>
            <div class="title">WELZ MODS</div>
            <div style="width: 40px;"></div>
        </div>

        <div class="header-pill">Yalnız Alış Üçün Canlı Dəstək</div>
        <div class="session-info" id="sessionInfo">Sessiya ID: Yüklənir...</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="typing-indicator" id="typingIndicator">Mesaj göndərilir...</div>

        <div class="chat-input-container" id="chatInputContainer">
            <button class="icon-btn" onclick="document.getElementById('imagePicker').click()">+</button>
            <input type="text" class="chat-input" id="messageInput" placeholder="Mesajınızı yazın..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <input type="file" id="imagePicker" accept="image/*" style="display:none" onchange="handleImageSelect(event)">

    <script>
        const BOT_TOKEN = '8006024813:AAEI-y4VBZNLDwCqNIwF3GTNJRXS7HxHL5Y';
        const ADMIN_CHAT_ID = '8140169698';

        let currentSessionId = localStorage.getItem('welz_session') || Math.floor(Math.random() * 9999) + 1;
        localStorage.setItem('welz_session', currentSessionId);

        let chatHistory = JSON.parse(localStorage.getItem('welz_history_' + currentSessionId) || '[]');
        let lastUpdateId = parseInt(localStorage.getItem('welz_last_update') || '0');
        let isBlacklisted = localStorage.getItem('welz_bl_' + currentSessionId) === 'true';

        function init() {
            document.getElementById('sessionInfo').innerText = `Sessiya ID: #${currentSessionId}`;
            if(isBlacklisted) applyBlacklist();
            renderHistory();
            if(chatHistory.length === 0) startNewSession();
            setInterval(checkForReplies, 5000);
            showInfoModal();
        }

        async function startNewSession() {
            const ipData = await fetch('https://ipapi.co/json/').then(r => r.json()).catch(() => ({ip: 'Naməlum'}));
            sendToTelegram(`🚀 **YENİ İSTİFADƏÇİ**\nSessiya: #${currentSessionId}\nIP: ${ipData.ip}\nMəkan: ${ipData.city || 'Naməlum'}\nCihaz: ${navigator.platform}`);
            displayMessage(`Sistemə qoşuldunuz. Sessiyanız: #${currentSessionId}. Alış üçün hazırsınızsa yazın.`, 'bot');
        }

        function renderHistory() {
            chatHistory.forEach(msg => renderChatItem(msg));
            const cont = document.getElementById('chatMessages');
            cont.scrollTop = cont.scrollHeight;
        }

        function renderChatItem(msg) {
            const cont = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${msg.sender}-message`;
            div.innerHTML = `${msg.text}<div class="message-time">${msg.time}</div>`;
            cont.appendChild(div);
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const txt = input.value.trim();
            if(!txt || isBlacklisted) return;
            displayMessage(txt, 'user');
            input.value = '';
            document.getElementById('typingIndicator').style.display = 'block';
            await sendToTelegram(`[#${currentSessionId}] Mesaj: ${txt}`);
            document.getElementById('typingIndicator').style.display = 'none';
        }

        function displayMessage(text, sender) {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const msg = { text, sender, time };
            chatHistory.push(msg);
            localStorage.setItem('welz_history_' + currentSessionId, JSON.stringify(chatHistory));
            renderChatItem(msg);
            const cont = document.getElementById('chatMessages');
            cont.scrollTop = cont.scrollHeight;
        }

        async function sendToTelegram(msg) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text: msg })
                });
                return res.ok;
            } catch { return false; }
        }

        async function checkForReplies() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();
                if(data.ok && data.result.length > 0) {
                    data.result.forEach(u => {
                        lastUpdateId = u.update_id;
                        localStorage.setItem('welz_last_update', lastUpdateId);
                        if(u.message && u.message.text && String(u.message.chat.id) === ADMIN_CHAT_ID) {
                            const txt = u.message.text.trim();
                            if(txt.startsWith(`#${currentSessionId}`)) {
                                const action = txt.split(' ')[1];
                                if(action === 'blacklist') applyBlacklist();
                                else if(action === 'unblacklist') removeBlacklist();
                                else displayMessage(txt.replace(`#${currentSessionId}`, '').trim(), 'bot');
                            }
                        }
                    });
                }
            } catch (e) {}
        }

        function applyBlacklist() {
            isBlacklisted = true;
            localStorage.setItem('welz_bl_' + currentSessionId, 'true');
            document.getElementById('chatInputContainer').style.display = 'none';
            const div = document.createElement('div');
            div.className = 'modal-backdrop';
            div.innerHTML = `<div class="modal"><h3>BLOKLANDINIZ</h3><p>Siz WELZ MODS sistemindən kənarlaşdırıldınız.</p></div>`;
            document.body.appendChild(div);
        }

        function removeBlacklist() {
            localStorage.removeItem('welz_bl_' + currentSessionId);
            location.reload();
        }

        function showInfoModal() {
            const div = document.createElement('div');
            div.className = 'modal-backdrop';
            div.id = 'infoModal';
            div.innerHTML = `<div class="modal"><h3>MƏLUMAT</h3><p>Bu çat yalnız məhsul alışı üçündür. Mövzu kənarı suallar cavablandırılmır. Hazır olanlar yazsın.</p><button class="btn-close" onclick="document.getElementById('infoModal').remove()">ANLADIM</button></div>`;
            document.body.appendChild(div);
        }

        function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }
        
        async function handleImageSelect(e) {
            const file = e.target.files[0];
            if(!file || isBlacklisted) return;
            const fd = new FormData();
            fd.append('chat_id', ADMIN_CHAT_ID);
            fd.append('photo', file);
            fd.append('caption', `[#${currentSessionId}] Şəkil göndərildi.`);
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            displayMessage("📷 Şəkil göndərildi.", 'user');
        }

        window.onload = init;
    </script>
</body>
</html>
